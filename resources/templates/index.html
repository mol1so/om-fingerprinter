<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>
    <title>om-fingerprinter: FP-Demo</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" type="text/css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}" type="text/css">

    <meta name="author" content="Oldrich Molis">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="om-fingerprinter: FP-Demo">
    <meta name="theme-color" content="#36393f">

    {% include "partials/favicon.html" %}
</head>
<body>
    {% include "partials/noscript.html" %}

    {% include "partials/header.html" %}

    <main>
        <section class="card-grid">
            <a href="{{ url_for('views.item01') }}" target="_blank" class="card-link">
                <div class="card-image">
                    <img src="{{ url_for('static', filename='images/tabler-icons-3.40.0/device-desktop.svg') }}" alt="Image Monitor">
                </div>
                <h3 class="card-title">Monitor</h3>
            </a>

            <a href="{{ url_for('views.item02') }}" target="_blank" class="card-link">
                <div class="card-image">
                    <img src="{{ url_for('static', filename='images/tabler-icons-3.40.0/device-watch.svg') }}" alt="Image Smartwatch">
                </div>
                <h3 class="card-title">Smartwatch</h3>
            </a>

            <a href="{{ url_for('views.item03') }}" target="_blank" class="card-link">
                <div class="card-image">
                    <img src="{{ url_for('static', filename='images/tabler-icons-3.40.0/camera.svg') }}" alt="Image Camera">
                </div>
                <h3 class="card-title">Camera</h3>
            </a>

            <a href="{{ url_for('views.item04') }}" target="_blank" class="card-link">
                <div class="card-image">

                </div>
                <h3 class="card-title">Camcorder</h3>
            </a>

            <a href="{{ url_for('views.item05') }}" target="_blank" class="card-link">
                <div class="card-image">
                    <img src="{{ url_for('static', filename='images/tabler-icons-3.40.0/printer.svg') }}" alt="Image Printer">
                </div>
                <h3 class="card-title">Printer</h3>
            </a>

            <a href="{{ url_for('views.item06') }}" target="_blank" class="card-link">
                <div class="card-image">
                    <img src="{{ url_for('static', filename='images/tabler-icons-3.40.0/headset.svg') }}" alt="Image Headset">
                </div>
                <h3 class="card-title">Headset</h3>
            </a>

            <a href="{{ url_for('views.item07') }}" target="_blank" class="card-link">
                <div class="card-image">
                    <img src="{{ url_for('static', filename='images/tabler-icons-3.40.0/calculator.svg') }}" alt="Image Calculator">
                </div>
                <h3 class="card-title">Calculator</h3>
            </a>

            <a href="{{ url_for('views.item08') }}" target="_blank" class="card-link">
                <div class="card-image">
                    <img src="{{ url_for('static', filename='images/tabler-icons-3.40.0/microphone.svg') }}" alt="Image Microphone">
                </div>
                <h3 class="card-title">Microphone</h3>
            </a>
        </section>

        <section id="last-viewed-section">
            <h2 class="last-viewed-section-title">Last Viewed</h2>

            <div class="card-grid">
                <a href="" class="card-link" id="last-viewed-item">
                    <div class="card-image">
                        <img src="" alt="">
                    </div>
                    <h3 class="card-title"></h3>
                </a>
            </div>
        </section>
    </main>
    
    <script type="module" src="{{ url_for('static', filename='js/om-fingerprinter-client.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/fp-demo.js') }}"></script>
</body>
</html>
